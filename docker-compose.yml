version: "2.4"

volumes:
  victoria-metrics:
  garmin-tokens:
  home-assistant-config:
  caddy-data:
  gdrive-rag-data:

services:
  database:
    image: victoriametrics/victoria-metrics:latest
    hostname: database
    restart: unless-stopped
    # No ports exposed - only accessible via database-auth (vmauth) for security
    volumes:
      - victoria-metrics:/victoria-metrics-data
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=3y
      - -httpListenAddr=:8181
      - -dedup.minScrapeInterval=10s

  database-auth:
    image: victoriametrics/vmauth:latest
    hostname: database-auth
    restart: unless-stopped
    ports:
      - "8427:8427"
    environment:
      - VMAUTH_CONFIG
    command:
      - sh
      - -c
      - 'echo "$$VMAUTH_CONFIG" > /etc/auth.yml && exec vmauth -auth.config=/etc/auth.yml'
    depends_on:
      - database

  https-proxy:
    image: europe-docker.pkg.dev/filiplindqvist-com-ea66d/images/https-proxy:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - caddy-data:/data
    depends_on:
      - iot-fetcher
      - database-auth
      - ai-assistant
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"

  ai-assistant:
    image: europe-docker.pkg.dev/filiplindqvist-com-ea66d/images/ai-assistant:latest
    hostname: ai-assistant
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
    depends_on:
      - database-auth
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"

  iot-fetcher:
    image: europe-docker.pkg.dev/filiplindqvist-com-ea66d/images/iot-fetcher:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    depends_on:
      - database-auth
      - sonos-http-api
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"

  pool-pump-planner:
    image: europe-docker.pkg.dev/filiplindqvist-com-ea66d/images/pool-pump-planner:latest
    restart: unless-stopped
    depends_on:
      - database-auth
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"

  sigenergy-bridge:
    image: europe-docker.pkg.dev/filiplindqvist-com-ea66d/images/sigenergy-bridge:latest
    restart: unless-stopped
    network_mode: host
    depends_on:
      - database-auth
      - home-assistant
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"

  gdrive-rag:
    image: europe-docker.pkg.dev/filiplindqvist-com-ea66d/images/gdrive-rag:latest
    hostname: gdrive-rag
    restart: unless-stopped
    volumes:
      - gdrive-rag-data:/data
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"

  tibber-influx-bridge:
    image: tkhduracell/tibber-influxdb-bridge:latest
    restart: unless-stopped
    depends_on:
      - https-proxy

  garmin-influx-bridge:
    image: europe-docker.pkg.dev/filiplindqvist-com-ea66d/images/garmin-fetch:latest
    restart: unless-stopped
    volumes:
      - garmin-tokens:/home/appuser/.garminconnect
    depends_on:
      - https-proxy
    labels:
      - "wud.watch=true"
      - "wud.watch.digest=true"

  home-assistant:
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - home-assistant-config:/config
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Europe/Stockholm

  sonos-http-api:
    image: ghcr.io/tkhduracell/sonos-http-api:master
    hostname: sonos-http-api
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Europe/Stockholm

  wud:
    image: getwud/wud
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - WUD_WATCHER_LOCAL_WATCHBYDEFAULT=false
      - WUD_WATCHER_LOCAL_CRON=*/5 * * * *
      - WUD_REGISTRY_CUSTOM_GAR_URL=https://europe-docker.pkg.dev
      - WUD_TRIGGER_DOCKER_LOCAL_PRUNE=true