version: "2.4"

services:
  database:
    container_name: victoria-metrics
    volumes:
      - ./volumes/victoria-metrics:/victoria-metrics-data

  database-auth:
    container_name: victoria-metrics-auth
    volumes:
      - ./victoria-metrics/auth.yml:/etc/auth.yml:ro
    command:
      - -auth.config=/etc/auth.yml

  https-proxy:
    container_name: https-proxy
    env_file: ./https-proxy/.env

  iot-fetcher:
    container_name: iot-fetcher
    env_file: 
      - ./fetcher-core/python/.env
      - ./fetcher-core/webui/.env

  pool-pump-planner:
    container_name: pool-pump-planner
    env_file: ./pool-pump-planner/.env

  tibber-influx-bridge:
    container_name: tibber-influxdb-bridge
    env_file: ./tibber-influx-bridge/.env

  garmin-influx-bridge:
    container_name: garmin-influx-bridge
    env_file: ./garmin-influx-bridge/.env
    volumes:
      - ./volumes/garmin-tokens:/home/appuser/.garminconnect

  home-assistant:
    container_name: home-assistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./volumes/home-assistant-config:/config

  sonos-http-api:
    container_name: sonos-http-api
    volumes:
      - ./sonos-http-api/settings.json:/app/settings.json:ro

  ai-assistant:
    container_name: ai-assistant
    env_file: ./ai-assistant/.env
    volumes:
      - ./volumes/ai-assistant-data:/app/data

  wud:
    container_name: wud
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

