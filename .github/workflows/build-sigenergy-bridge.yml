name: Build and Test sigenergy-bridge

on:
  push:
    branches:
      - main
    paths:
      - 'sigenergy-bridge/**'
      - '.github/workflows/build-sigenergy-bridge.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'sigenergy-bridge/**'
      - '.github/workflows/build-sigenergy-bridge.yml'

jobs:
  test-sigenergy-bridge:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: ./sigenergy-bridge/go.mod
        cache: false

    - name: Go vet
      working-directory: ./sigenergy-bridge
      run: go vet ./...

    - name: Go test
      working-directory: ./sigenergy-bridge
      run: go test ./...

  build-sigenergy-bridge:
    runs-on: ubuntu-latest
    needs: test-sigenergy-bridge

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - uses: 'google-github-actions/auth@v3'
      id: auth
      if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
      with:
        token_format: access_token
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

    - uses: docker/login-action@v4
      if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
      with:
        registry: europe-docker.pkg.dev
        username: oauth2accesstoken
        password: '${{ steps.auth.outputs.access_token }}'

    - name: Build And Push sigenergy-bridge image
      uses: docker/build-push-action@v7
      if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
      with:
        context: ./sigenergy-bridge/
        platforms: linux/amd64,linux/arm64
        push: true
        tags: europe-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/images/sigenergy-bridge:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build sigenergy-bridge image
      uses: docker/build-push-action@v7
      if: ${{ !(github.ref == 'refs/heads/main' && github.event_name != 'pull_request') }}
      with:
        context: ./sigenergy-bridge/
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
